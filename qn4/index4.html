<!DOCTYPE html>
<html>
<head>
    <title>My Home Town</title>

    <style>
        body {
            background: linear-gradient(to right, #87CEEB, #ffffff);
            font-family: 'Arial', sans-serif;
            color: #333;
            text-align: center;
        }

        h1 {
            color: darkblue;
            font-size: 40px;
        }

        p {
            font-size: 18px;
            width: 70%;
            margin: auto;
        }

        img {
            width: 300px;
            border-radius: 15px;
            margin: 20px;
        }

        .highlight {
            color: darkgreen;
            font-weight: bold;
        }

        .box {
            background-color: #f0f8ff;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>My Home Town</h1>

    <img src="home.jpg" alt="Hometown Image">

    <div class="box">
        <p>
            Welcome to my hometown! It is a beautiful place known for its 
            <span class="highlight">natural beauty</span>, friendly people, 
            and peaceful environment.
        </p>

        <p>
            There are many attractions such as parks, temples, and rivers. 
            The climate is pleasant and perfect for living.
        </p>
    </div>

</body>
</html>
